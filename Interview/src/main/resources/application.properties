spring.application.name=Interview
spring.datasource.url=jdbc:mysql://localhost:3306/interviewiqpro
spring.datasource.username=interviewiq_user
spring.datasource.password=interviewiq_pass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

app.jwt.secret=change-this-to-a-long-random-secret-at-least-32-characters
app.jwt.expiration-ms=86400000



# Spring AI - Groq (OpenAI-compatible)
spring.ai.openai.api-key=${GROQ_API_KEY}
spring.ai.openai.base-url=https://api.groq.com/openai/v1
spring.ai.openai.chat.options.model=llama-3.3-70b-versatile